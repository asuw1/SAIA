<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAIA — Sign In</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-body">

  <button class="login-theme-toggle" id="loginThemeToggle" title="Toggle dark mode">
    <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">SAIA</div>
        <div class="login-title">Secure Artificial Intelligence Auditor</div>
        <div class="login-subtitle">NCA ECC 2:2024 Compliance Platform</div>
      </div>

      <div id="loginMessage" class="login-message" style="display:none;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Enter your username" required autofocus autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <div class="remember-me">
          <input type="checkbox" id="rememberMe">
          <label for="rememberMe" style="margin:0;cursor:pointer;font-weight:400;">Remember me</label>
        </div>
        <button type="submit" class="login-button" id="loginBtn">Sign In</button>
      </form>

      <div class="demo-hint">
        <span class="demo-hint-title">Demo Credentials</span>
        <div class="demo-hint-creds">
          <div class="demo-hint-item"><strong>Admin:</strong> admin / admin123</div>
          <div class="demo-hint-item"><strong>Compliance:</strong> compliance / comp123</div>
          <div class="demo-hint-item"><strong>Analyst:</strong> auditor / audit123</div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/nav.js"></script>
  <script>
    const DEMO_USERS = [
      { username: 'admin',      password: 'admin123', role: 'Administrator',      name: 'Admin User' },
      { username: 'compliance', password: 'comp123',  role: 'Compliance Officer', name: 'Compliance Officer' },
      { username: 'auditor',    password: 'audit123', role: 'Analyst',            name: 'Audit User' },
      { username: 'demo',       password: 'demo',     role: 'Analyst',            name: 'Demo User' },
    ];

    function showMsg(msg, type) {
      const el = document.getElementById('loginMessage');
      el.textContent = msg; el.className = 'login-message ' + type; el.style.display = 'block';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('rememberMe').checked;
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Signing in…';

      setTimeout(() => {
        const user = DEMO_USERS.find(u => u.username === username && u.password === password);
        if (user) {
          const info  = { username: user.username, name: user.name, role: user.role };
          const token = 'demo-token-' + Math.random().toString(36).substr(2, 9);
          sessionStorage.setItem('saia_user', JSON.stringify(info));
          sessionStorage.setItem('saia_token', token);
          if (remember) { localStorage.setItem('saia_user', JSON.stringify(info)); localStorage.setItem('saia_token', token); }
          showMsg('Login successful! Redirecting…', 'success');
          setTimeout(() => window.location.href = 'index.html', 900);
        } else {
          showMsg('Invalid username or password.', 'error');
          btn.disabled = false; btn.textContent = 'Sign In';
        }
      }, 500);
    });

    window.addEventListener('DOMContentLoaded', () => {
      if (sessionStorage.getItem('saia_token') || localStorage.getItem('saia_token'))
        window.location.href = 'index.html';
    });

    document.addEventListener('keydown', e => {
      if (e.altKey && e.key === 'd') {
        document.getElementById('username').value = 'admin';
        document.getElementById('password').value = 'admin123';
      }
    });
  </script>
</body>
</html>
