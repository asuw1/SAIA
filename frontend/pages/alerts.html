<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAIA — Alerts</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <header class="top-nav">
    <div class="nav-left">
      <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
      <span class="system-name">SAIA</span>
    </div>
    <div class="nav-right">
      <div class="user-info">
        <div class="user-avatar">U</div>
        <div><div class="user-name">User</div><div class="user-role">Role</div></div>
      </div>
      <button class="notification-btn" title="Notifications">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notification-badge">27</span>
      </button>
      <button class="btn-icon" id="logoutBtn" title="Logout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <main class="main-content">
    <div class="page-header-row">
      <div>
        <h1 style="font-size:22px;font-weight:700;">Alerts</h1>
        <p style="font-size:13px;color:var(--text-secondary);margin-top:2px;">All detected anomalies and rule violations</p>
      </div>
      <button class="btn btn-primary" onclick="showToast('Bulk export coming soon','info')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </button>
    </div>

    <!-- Filters -->
    <div class="table-section">
      <div class="table-header">
        <div class="filter-row">
          <div class="search-bar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="form-control" id="searchInput" placeholder="Search alerts…">
          </div>
          <select id="severityFilter" class="form-control">
            <option value="">All Severities</option>
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <select id="statusFilter" class="form-control">
            <option value="">All Statuses</option>
            <option value="open">Open</option>
            <option value="investigating">Investigating</option>
            <option value="resolved">Resolved</option>
            <option value="false-positive">False Positive</option>
          </select>
          <select id="domainFilter" class="form-control">
            <option value="">All Domains</option>
            <option value="IAM">IAM</option>
            <option value="Network">Network</option>
            <option value="Application">Application</option>
            <option value="Cloud">Cloud</option>
          </select>
        </div>
        <span id="alertCount" style="font-size:12px;color:var(--text-tertiary);"></span>
      </div>

      <div class="table-container">
        <table class="table">
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAll"></th>
              <th>Alert ID</th>
              <th>NCA Clause</th>
              <th>Domain</th>
              <th>Severity</th>
              <th>Status</th>
              <th>Entity</th>
              <th>Anomaly Score</th>
              <th>Timestamp</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="alertsTableBody"></tbody>
        </table>
      </div>

      <div class="pagination">
        <span id="paginationInfo">Showing 1–10 of 45</span>
        <div class="pagination-pages" id="paginationPages"></div>
      </div>
    </div>
  </main>

  <script src="../assets/js/nav.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/api.js"></script>
  <script>
    const MOCK_ALERTS = [
      { id:'SAIA-2024-0001', clause:'2-2-1', domain:'IAM',         severity:'critical', status:'open',          entity:'user:ahmed.admin', score:0.94, ts:'21 Oct 2024, 14:32' },
      { id:'SAIA-2024-0002', clause:'2-4-3', domain:'Network',     severity:'high',     status:'investigating', entity:'ip:192.168.1.45',  score:0.81, ts:'21 Oct 2024, 13:15' },
      { id:'SAIA-2024-0003', clause:'2-7-2', domain:'Application', severity:'medium',   status:'open',          entity:'svc:api-gateway',  score:0.67, ts:'21 Oct 2024, 12:48' },
      { id:'SAIA-2024-0004', clause:'2-9-1', domain:'Cloud',       severity:'low',      status:'resolved',      entity:'vm:prod-db-01',    score:0.42, ts:'21 Oct 2024, 11:22' },
      { id:'SAIA-2024-0005', clause:'2-2-4', domain:'IAM',         severity:'critical', status:'open',          entity:'user:svc-account', score:0.96, ts:'21 Oct 2024, 10:55' },
      { id:'SAIA-2024-0006', clause:'2-5-1', domain:'Network',     severity:'high',     status:'open',          entity:'fw:perimeter-01',  score:0.79, ts:'21 Oct 2024, 09:30' },
      { id:'SAIA-2024-0007', clause:'2-3-2', domain:'Application', severity:'medium',   status:'investigating', entity:'svc:login-api',    score:0.61, ts:'21 Oct 2024, 08:17' },
      { id:'SAIA-2024-0008', clause:'2-11-1',domain:'Cloud',       severity:'high',     status:'open',          entity:'s3:backup-bucket', score:0.83, ts:'20 Oct 2024, 22:45' },
    ];

    function renderTable() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const sev    = document.getElementById('severityFilter').value;
      const stat   = document.getElementById('statusFilter').value;
      const dom    = document.getElementById('domainFilter').value;
      const tbody  = document.getElementById('alertsTableBody');

      let filtered = MOCK_ALERTS.filter(a =>
        (!search || a.id.toLowerCase().includes(search) || a.entity.toLowerCase().includes(search) || a.clause.includes(search)) &&
        (!sev  || a.severity === sev) &&
        (!stat || a.status   === stat) &&
        (!dom  || a.domain   === dom)
      );

      document.getElementById('alertCount').textContent = `${filtered.length} alert${filtered.length !== 1 ? 's' : ''}`;

      tbody.innerHTML = filtered.map(a => `
        <tr>
          <td><input type="checkbox"></td>
          <td><a href="alert-detail.html?id=${a.id}" class="alert-id-link">${a.id}</a></td>
          <td><span class="clause-chip">${a.clause}</span></td>
          <td style="font-size:12px;color:var(--text-secondary);">${a.domain}</td>
          <td><span class="severity-badge ${a.severity}">${a.severity}</span></td>
          <td><span class="status-badge ${a.status}">${a.status}</span></td>
          <td style="font-size:12px;font-family:monospace;">${a.entity}</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="progress-bar" style="width:60px;"><div class="progress-bar-fill" style="width:${a.score*100}%;background:${a.score>0.85?'var(--critical)':a.score>0.65?'var(--high)':'var(--medium)'};"></div></div>
              <span style="font-size:12px;font-weight:600;">${a.score.toFixed(2)}</span>
            </div>
          </td>
          <td style="font-size:12px;color:var(--text-secondary);">${a.ts}</td>
          <td>
            <a href="alert-detail.html?id=${a.id}" class="btn btn-secondary btn-sm">View</a>
          </td>
        </tr>`).join('') ||
        '<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--text-tertiary);">No alerts match your filters</td></tr>';
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderTable();
      ['searchInput','severityFilter','statusFilter','domainFilter'].forEach(id => {
        document.getElementById(id).addEventListener('input', renderTable);
        document.getElementById(id).addEventListener('change', renderTable);
      });
      document.getElementById('selectAll').addEventListener('change', function() {
        document.querySelectorAll('#alertsTableBody input[type=checkbox]').forEach(cb => cb.checked = this.checked);
      });
    });
  </script>
</body>
</html>
