<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAIA — Detection Rules</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <header class="top-nav">
    <div class="nav-left">
      <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
      <span class="system-name">SAIA</span>
    </div>
    <div class="nav-right">
      <div class="user-info">
        <div class="user-avatar">U</div>
        <div><div class="user-name">User</div><div class="user-role">Role</div></div>
      </div>
      <button class="btn-icon" id="logoutBtn" title="Logout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <main class="main-content">
    <div class="page-header-row">
      <div>
        <h1 style="font-size:22px;font-weight:700;">Detection Rules</h1>
        <p style="font-size:13px;color:var(--text-secondary);margin-top:2px;">Configure rule-based anomaly detection mapped to NCA ECC controls</p>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" onclick="showToast('Dry-run complete — 3 rules would have fired','info')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Dry Run All
        </button>
        <button class="btn btn-primary" id="newRuleBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Rule
        </button>
      </div>
    </div>

    <div class="table-section">
      <div class="table-header">
        <div class="filter-row">
          <div class="search-bar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="form-control" placeholder="Search rules…">
          </div>
          <select class="form-control"><option value="">All Domains</option><option>IAM</option><option>Network</option><option>Application</option><option>Cloud</option></select>
          <select class="form-control"><option value="">All Statuses</option><option>active</option><option>inactive</option></select>
        </div>
      </div>
      <div class="table-container">
        <table class="table">
          <thead>
            <tr><th>Rule Name</th><th>Domain</th><th>NCA Clause</th><th>Operator</th><th>Threshold</th><th>Severity</th><th>Status</th><th>Fires (7d)</th><th>Actions</th></tr>
          </thead>
          <tbody id="rulesBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- New Rule Modal -->
  <div class="modal-overlay hidden" id="ruleModal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h3>Create Detection Rule</h3>
        <button class="modal-close" onclick="document.getElementById('ruleModal').classList.add('hidden')">×</button>
      </div>
      <div class="modal-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group" style="grid-column:1/-1;"><label>Rule Name</label><input type="text" class="form-control" placeholder="e.g. Excessive failed logins"></div>
          <div class="form-group"><label>Domain</label><select class="form-control"><option>IAM</option><option>Network</option><option>Application</option><option>Cloud</option></select></div>
          <div class="form-group"><label>NCA Clause</label><input type="text" class="form-control" placeholder="e.g. 2-2-1"></div>
          <div class="form-group"><label>Operator</label><select class="form-control"><option>threshold</option><option>regex</option><option>geo_anomaly</option><option>time_window</option><option>sequence</option></select></div>
          <div class="form-group"><label>Threshold Value</label><input type="number" class="form-control" placeholder="e.g. 10"></div>
          <div class="form-group"><label>Severity</label><select class="form-control"><option>critical</option><option>high</option><option selected>medium</option><option>low</option></select></div>
          <div class="form-group"><label>Time Window (seconds)</label><input type="number" class="form-control" placeholder="e.g. 300"></div>
          <div class="form-group" style="grid-column:1/-1;"><label>Description</label><textarea class="form-control" placeholder="Describe what this rule detects…"></textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('ruleModal').classList.add('hidden')">Cancel</button>
        <button class="btn btn-secondary" onclick="showToast('Dry run: rule would fire on 3 recent events','info')">Dry Run</button>
        <button class="btn btn-primary" onclick="showToast('Rule created','success');document.getElementById('ruleModal').classList.add('hidden')">Save Rule</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/nav.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    const MOCK_RULES = [
      { name:'Excessive Failed Logins', domain:'IAM',         clause:'2-2-1', operator:'threshold',   threshold:'≥10 / 5min', severity:'high',     status:'active',   fires:12 },
      { name:'Off-Hours Privileged Access', domain:'IAM',     clause:'2-2-3', operator:'time_window',  threshold:'Outside 07-18', severity:'medium', status:'active',   fires:5 },
      { name:'Port Scan Detection', domain:'Network',          clause:'2-4-1', operator:'threshold',   threshold:'≥50 ports/min', severity:'high',   status:'active',   fires:3 },
      { name:'Geolocation Anomaly', domain:'IAM',              clause:'2-2-2', operator:'geo_anomaly', threshold:'Foreign IP',   severity:'critical', status:'active',   fires:2 },
      { name:'SQL Injection Pattern', domain:'Application',    clause:'2-7-1', operator:'regex',       threshold:'Union/Select',  severity:'critical', status:'active',  fires:0 },
      { name:'Cloud Storage Public Exposure', domain:'Cloud',  clause:'2-11-1',operator:'threshold',   threshold:'ACL=public',   severity:'critical', status:'active',   fires:1 },
      { name:'Inactive Rule Example', domain:'Network',        clause:'2-4-3', operator:'threshold',   threshold:'≥100 pps',     severity:'low',      status:'inactive', fires:0 },
    ];

    document.addEventListener('DOMContentLoaded', () => {
      const tbody = document.getElementById('rulesBody');
      tbody.innerHTML = MOCK_RULES.map(r => `
        <tr>
          <td style="font-weight:500;">${r.name}</td>
          <td style="font-size:12px;color:var(--text-secondary);">${r.domain}</td>
          <td><span class="clause-chip">${r.clause}</span></td>
          <td style="font-size:12px;font-family:monospace;">${r.operator}</td>
          <td style="font-size:12px;color:var(--text-secondary);">${r.threshold}</td>
          <td><span class="severity-badge ${r.severity}">${r.severity}</span></td>
          <td>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="checkbox" ${r.status==='active'?'checked':''} style="accent-color:var(--brand);width:14px;height:14px;" onchange="showToast('Rule ${r.status==='active'?'disabled':'enabled'}','info')">
              <span class="status-badge ${r.status}">${r.status}</span>
            </label>
          </td>
          <td style="font-size:12px;font-weight:600;color:${r.fires>5?'var(--critical)':r.fires>0?'var(--medium)':'var(--text-tertiary)'};">${r.fires}</td>
          <td style="display:flex;gap:4px;">
            <button class="btn btn-secondary btn-sm" onclick="showToast('Dry run: rule would fire on ${Math.max(0,r.fires-1)} events','info')">Test</button>
            <button class="btn btn-secondary btn-sm" onclick="showToast('Edit coming soon','info')">Edit</button>
          </td>
        </tr>`).join('');

      document.getElementById('newRuleBtn').addEventListener('click', () => document.getElementById('ruleModal').classList.remove('hidden'));
      document.getElementById('ruleModal').addEventListener('click', function(e) { if(e.target===this) this.classList.add('hidden'); });
    });
  </script>
</body>
</html>
