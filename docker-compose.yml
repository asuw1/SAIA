version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: saia-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-saia_db}
      POSTGRES_USER: ${DB_USER:-saia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-saia_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-saia} -d ${DB_NAME:-saia_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saia-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: saia-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saia-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saia-backend
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_MOCK_MODE: ${LLM_MOCK_MODE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIM: ${EMBEDDING_DIM}
      INGEST_RATE_LIMIT: ${INGEST_RATE_LIMIT}
      APP_NAME: ${APP_NAME}
      APP_VERSION: ${APP_VERSION}
      DEBUG: ${DEBUG}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - saia-network

volumes:
  postgres_data:
  qdrant_data:

networks:
  saia-network:
    driver: bridge
